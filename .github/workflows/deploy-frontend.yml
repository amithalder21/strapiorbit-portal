name: Deploy Frontend

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install and Build
        run: |
          npm ci
          BUILD_STATIC=1 NEXT_PUBLIC_API_URL=https://api-beta.strapiorbit.cloud npm run build:static

      - name: Copy static files to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: "out/*"
          target: "/var/www/strapiorbit"
          strip_components: 1

      - name: Deploy nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: "nginx/strapiorbit.conf"
          target: "/etc/nginx/conf.d/"
          strip_components: 1

      - name: Reload Nginx to clear cache
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            chcon -Rt httpd_sys_content_t /var/www/strapiorbit 2>/dev/null || true
            chown -R nginx:nginx /var/www/strapiorbit
            chmod -R 755 /var/www/strapiorbit
            nginx -t && systemctl reload nginx
