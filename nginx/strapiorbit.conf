server {
    listen 80;
    listen [::]:80;
    server_name strapiorbit.cloud www.strapiorbit.cloud;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name strapiorbit.cloud www.strapiorbit.cloud;

    root /var/www/strapiorbit;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/beta.strapiorbit.cloud-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beta.strapiorbit.cloud-0001/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Strip .html extension (permanent redirect) ──────────────────────────
    # Any direct request for /foo.html → 301 to /foo
    rewrite ^/(.*?)\.html$ /$1 permanent;

    # ── Clean URLs — serve /foo by transparently reading /foo.html ──────────
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # ── Security headers (mirrors Next.js server-mode headers) ──────────────
    add_header X-Frame-Options            "DENY"                              always;
    add_header X-Content-Type-Options     "nosniff"                           always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"   always;
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=(self)" always;
    add_header Cross-Origin-Opener-Policy "same-origin"                       always;
    add_header Cross-Origin-Resource-Policy "same-origin"                     always;

    # ── Cache static assets aggressively ────────────────────────────────────
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
